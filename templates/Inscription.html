{% extends "base.html" %}
{% block title %}Inscription — FormCollect{% endblock %}
{% block content %}

<div style="max-width:420px; margin:0 auto; padding-top:1rem;">
    <div style="text-align:center; margin-bottom:2rem;">
        <div style="font-size:2rem; color:var(--accent); margin-bottom:0.5rem;">✦</div>
        <h1 style="margin-bottom:0.25rem;">Créer un compte</h1>
        <p style="color:var(--text-muted); font-size:0.9rem;">Rejoignez FormCollect et créez vos premiers formulaires.</p>
    </div>

    {% if erreur %}
    <div style="background:#fdf0f5; border:1px solid #e8c0d4; color:#7a2045; border-radius:7px; padding:0.85rem 1rem; font-size:0.875rem; margin-bottom:1.25rem;">
        {{ erreur }}
    </div>
    {% endif %}

    <div class="card">
        <form method="POST">
            <label for="nom">Nom complet</label>
            <input type="text" id="nom" name="nom" placeholder="Jean Dupont" required autofocus>

            <label for="email">Adresse email</label>
            <input type="email" id="email" name="email" placeholder="votre@email.com" required>

            <label for="mot_de_passe">Mot de passe <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:0.8rem;">(6 caractères min.)</span></label>
            <input type="password" id="mot_de_passe" name="mot_de_passe" placeholder="••••••••" required>

            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">
                Créer mon compte →
            </button>
        </form>
    </div>

    <p style="text-align:center; margin-top:1.25rem; font-size:0.875rem; color:var(--text-muted);">
        Déjà un compte ?
        <a href="/connexion" style="color:var(--accent); font-weight:500; text-decoration:none;">Se connecter</a>
    </p>
</div>

{% endblock %}
