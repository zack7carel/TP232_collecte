{% extends "base.html" %}
{% block title %}Connexion — FormCollect{% endblock %}
{% block content %}

<div style="max-width:420px; margin:0 auto; padding-top:1rem;">
    <div style="text-align:center; margin-bottom:2rem;">
        <div style="font-size:2rem; color:var(--accent); margin-bottom:0.5rem;">✦</div>
        <h1 style="margin-bottom:0.25rem;">Bon retour !</h1>
        <p style="color:var(--text-muted); font-size:0.9rem;">Connectez-vous pour accéder à vos formulaires.</p>
    </div>

    {% if erreur %}
    <div style="background:#fdf0f5; border:1px solid #e8c0d4; color:#7a2045; border-radius:7px; padding:0.85rem 1rem; font-size:0.875rem; margin-bottom:1.25rem;">
        {{ erreur }}
    </div>
    {% endif %}

    <div class="card">
        <form method="POST">
            <label for="email">Adresse email</label>
            <input type="email" id="email" name="email" placeholder="votre@email.com" required autofocus>

            <label for="mot_de_passe">Mot de passe</label>
            <input type="password" id="mot_de_passe" name="mot_de_passe" placeholder="••••••••" required>

            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">
                Se connecter →
            </button>
        </form>
    </div>

    <p style="text-align:center; margin-top:1.25rem; font-size:0.875rem; color:var(--text-muted);">
        Pas encore de compte ?
        <a href="/inscription" style="color:var(--accent); font-weight:500; text-decoration:none;">Créer un compte</a>
    </p>
</div>

{% endblock %}
