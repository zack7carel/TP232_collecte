{% extends "base.html" %}
{% block title %}Accueil — FormCollect{% endblock %}
{% block content %}

<h1>FormCollect</h1>
<p class="subtitle">Créez des formulaires, collectez des réponses.</p>

<div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; max-width:520px;">
    <a href="/creer" class="card" style="text-decoration:none; color:inherit; transition:all 0.2s; cursor:pointer;" onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 8px 24px rgba(0,0,0,0.08)'" onmouseout="this.style.transform='';this.style.boxShadow=''">
        <div style="font-size:1.5rem; margin-bottom:0.75rem;">✦</div>
        <div style="font-weight:600; font-size:0.95rem; margin-bottom:0.3rem;">Créer un formulaire</div>
        <div style="font-size:0.8rem; color:var(--text-muted);">Nouveau formulaire avec champs personnalisés</div>
    </a>
    <a href="/liste" class="card" style="text-decoration:none; color:inherit; transition:all 0.2s; cursor:pointer;" onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 8px 24px rgba(0,0,0,0.08)'" onmouseout="this.style.transform='';this.style.boxShadow=''">
        <div style="font-size:1.5rem; margin-bottom:0.75rem;">▤</div>
        <div style="font-weight:600; font-size:0.95rem; margin-bottom:0.3rem;">Mes formulaires</div>
        <div style="font-size:0.8rem; color:var(--text-muted);">Consulter et gérer vos formulaires</div>
    </a>
</div>

{% endblock %}
