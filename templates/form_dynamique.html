<!DOCTYPE html>
<html>
<head>
    <title>{{ formulaire["titre"] }}</title>
    <style>
        body { 
            font-family: Arial; 
            max-width: 600px; 
            margin: 40px auto; 
        }

        input, select, textarea { 
            width: 100%; 
            margin: 10px 0; 
            padding: 8px; 
        }

        button { 
            background: blue; 
            color: white; 
            padding: 10px 20px; 
            border: none; 
            cursor: pointer; 
        }
    </style>
</head>

<body>

    <h1>{{ formulaire["titre"] }}</h1>
    
    <!-- 🔥 CORRECTION ICI -->
    <form method="POST" action="{{ url_for('soumettre', lien_unique=formulaire['lien_unique']) }}">
        
        {% for champ in champs %}
        <div>
            <label>
                {{ champ["label"] }}
                {% if champ["obligatoire"] == 1 %} *{% endif %}
            </label>
            
            {% if champ["type_champ"] == 'textarea' %}
                <textarea name="champ_{{ champ['id'] }}" {% if champ["obligatoire"] == 1 %}required{% endif %}></textarea>
                
            {% elif champ["type_champ"] == 'select' %}
                <select name="champ_{{ champ['id'] }}" {% if champ["obligatoire"] == 1 %}required{% endif %}>
                    {% for option in champ["options"].split(',') %}
                        <option value="{{ option.strip() }}">{{ option.strip() }}</option>
                    {% endfor %}
                </select>
                
            {% else %}
                <input 
                    type="{{ champ['type_champ'] }}" 
                    name="champ_{{ champ['id'] }}" 
                    {% if champ["obligatoire"] == 1 %}required{% endif %}
                >
            {% endif %}
        </div>
        {% endfor %}
        
        <button type="submit">Envoyer ✅</button>
    </form>

</body>
</html>
