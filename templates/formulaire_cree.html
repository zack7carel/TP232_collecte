{% extends "base.html" %}
{% block title %}Formulaire créé — FormCollect{% endblock %}
{% block content %}

<div style="max-width:480px; margin:0 auto; text-align:center; padding-top:2rem;">
    <div style="font-size:2.5rem; margin-bottom:1rem;">✦</div>
    <h1 style="margin-bottom:0.5rem;">Formulaire créé !</h1>
    <p class="subtitle">Partagez ce lien pour collecter des réponses.</p>

    <div class="card" style="margin-bottom:1.25rem;">
        <div class="mono" style="word-break:break-all; font-size:0.85rem; color:var(--text);">{{ url }}</div>
    </div>

    <div style="display:flex; gap:0.5rem; justify-content:center;">
        <a href="{{ url }}" target="_blank" class="btn btn-secondary">Voir le formulaire</a>
        <a href="/liste" class="btn btn-primary">Mes formulaires</a>
    </div>
</div>

{% endblock %}
