<!DOCTYPE html>
<html>
<head>
    <title>Ajouter des champs</title>
    <style>
        body {
            font-family: Arial;
            margin: 30px;
        }

        .champ {
            border: 1px solid #ddd;
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
        }

        input, select {
            margin: 5px 0;
            padding: 5px;
        }

        button {
            padding: 8px 12px;
            margin: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- 🔥 CORRECTION ICI -->
    <h1>Formulaire : {{ formulaire["titre"] }}</h1>
    
    <h2>➕ Ajouter un champ</h2>

    <form method="POST">

        <label>Label :</label><br>
        <input type="text" name="label" required><br>

        <label>Type :</label><br>
        <select name="type_champ">
            <option value="text">Texte court</option>
            <option value="email">Email</option>
            <option value="number">Nombre</option>
            <option value="textarea">Texte long</option>
            <option value="select">Liste déroulante</option>
        </select><br>

        <label>Options (si liste déroulante) :</label><br>
        <input type="text" name="options" placeholder="ex: Oui,Non,Peut-être"><br>

        <label>
            <input type="checkbox" name="obligatoire"> Champ obligatoire
        </label><br><br>

        <!-- 🔥 CORRECTION ICI -->
        <button type="submit" name="ajouter_autre">➕ Ajouter un autre champ</button>
        <button type="submit" name="terminer">✅ Terminer</button>

    </form>

    <h2>📋 Champs existants</h2>

    {% for champ in champs %}
    <div class="champ">
        <strong>{{ champ["label"] }}</strong> ({{ champ["type_champ"] }}) 
        
        {% if champ["obligatoire"] == 1 %}
            ⚠️ obligatoire
        {% endif %}

        <a href="/admin/formulaire/{{ formulaire_id }}/supprimer_champ/{{ champ['id'] }}">
            🗑️ Supprimer
        </a>
    </div>
    {% endfor %}

    <br>
    <a href="/admin">⬅️ Retour admin</a>

</body>
</html>
